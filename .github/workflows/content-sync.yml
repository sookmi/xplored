name: Sync Airtable Content

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: content-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Sync Airtable To JSON
        run: npm run sync-content
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_RESOURCE_TABLE: ${{ secrets.AIRTABLE_RESOURCE_TABLE }}
          AIRTABLE_INSIGHT_TABLE: ${{ secrets.AIRTABLE_INSIGHT_TABLE }}

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/content
          git diff --staged --quiet || git commit -m "chore: sync airtable content"

      - name: Push Changes
        run: git push
